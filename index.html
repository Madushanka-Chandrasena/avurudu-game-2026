<!DOCTYPE html>
<html lang="si">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>සිංහල අවුරුදු කණා මුට්ටි බිඳීම</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+Sinhala:wght@400;700;900&display=swap');

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
            -webkit-user-select: none;
        }

        body {
            font-family: 'Noto Sans Sinhala', sans-serif;
            overflow: hidden;
            background-color: #87CEEB;
            /* Custom cursor as a stick */
            cursor: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="40" height="40" viewBox="0 0 40 40"><line x1="4" y1="36" x2="36" y2="4" stroke="%235c3a21" stroke-width="4" stroke-linecap="round"/></svg>') 10 30, crosshair;
        }

        /* Background Scenery */
        #gameArea {
            position: relative;
            width: 100vw;
            height: 100vh;
            background: linear-gradient(to bottom, #4facfe 0%, #00f2fe 50%, #76b852 50%, #8DC26F 100%);
            overflow: hidden;
        }

        /* The Sun */
        .sun {
            position: absolute;
            top: 10%;
            left: 50%;
            transform: translateX(-50%);
            width: 120px;
            height: 120px;
            background: radial-gradient(circle, #ffd700, #ff8c00);
            border-radius: 50%;
            box-shadow: 0 0 50px #ff8c00, 0 0 100px #ffd700;
            animation: pulseSun 3s infinite alternate;
        }

        @keyframes pulseSun {
            0% { transform: translateX(-50%) scale(1); box-shadow: 0 0 50px #ff8c00; }
            100% { transform: translateX(-50%) scale(1.05); box-shadow: 0 0 80px #ff8c00, 0 0 120px #ffd700; }
        }

        /* Decorative Bunting (Gok Kola / Flags) */
        .bunting {
            position: absolute;
            top: 0;
            width: 100%;
            height: 40px;
            background-image: repeating-linear-gradient(
                135deg,
                #ffcc00 0,
                #ffcc00 20px,
                #ff6600 20px,
                #ff6600 40px
            );
            border-bottom: 3px solid #b34700;
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
            z-index: 10;
        }

        /* HUD - Score and Time */
        .hud {
            position: absolute;
            top: 60px;
            left: 0;
            width: 100%;
            display: flex;
            justify-content: space-between;
            padding: 0 5%;
            z-index: 20;
            pointer-events: none;
        }

        .hud-box {
            background: rgba(255, 255, 255, 0.9);
            padding: 10px 20px;
            border-radius: 15px;
            font-size: 24px;
            font-weight: bold;
            color: #333;
            border: 3px solid #ff8c00;
            box-shadow: 0 4px 8px rgba(0,0,0,0.3);
            text-shadow: 1px 1px 0px #fff;
        }

        /* Game Items (Pots/Beehives) */
        .item-container {
            position: absolute;
            width: 80px;
            height: 120px;
            transform-origin: top center;
            animation: swing ease-in-out infinite alternate;
            z-index: 15;
            /* Make it easier to click on mobile */
            padding: 10px;
            margin-top: -10px;
        }

        .item-container svg {
            width: 100%;
            height: 100%;
            filter: drop-shadow(2px 5px 5px rgba(0,0,0,0.4));
            transition: transform 0.1s;
        }

        .item-container:active svg {
            transform: scale(0.9);
        }

        @keyframes swing {
            0% { transform: rotate(-15deg); }
            100% { transform: rotate(15deg); }
        }

        /* Floating Text for Points */
        .floating-text {
            position: absolute;
            font-size: 30px;
            font-weight: 900;
            z-index: 30;
            pointer-events: none;
            animation: floatUp 1s ease-out forwards;
            text-shadow: 2px 2px 0 #fff, -2px -2px 0 #fff, 2px -2px 0 #fff, -2px 2px 0 #fff;
        }

        @keyframes floatUp {
            0% { opacity: 1; transform: translateY(0) scale(1); }
            100% { opacity: 0; transform: translateY(-50px) scale(1.5); }
        }

        /* Particles */
        .particle {
            position: absolute;
            width: 10px;
            height: 10px;
            border-radius: 50%;
            pointer-events: none;
            z-index: 25;
            animation: explode 0.6s ease-out forwards;
        }

        @keyframes explode {
            0% { opacity: 1; transform: translate(0, 0) scale(1); }
            100% { opacity: 0; transform: translate(var(--tx), var(--ty)) scale(0); }
        }

        /* UI Overlays (Start & Game Over) */
        .overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.7);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 100;
            backdrop-filter: blur(5px);
        }

        .modal {
            background: linear-gradient(135deg, #fff9e6, #ffebd6);
            padding: 40px;
            border-radius: 20px;
            text-align: center;
            max-width: 90%;
            width: 450px;
            border: 5px solid #ff8c00;
            box-shadow: 0 15px 30px rgba(0,0,0,0.5);
            animation: popIn 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        @keyframes popIn {
            0% { transform: scale(0.5); opacity: 0; }
            100% { transform: scale(1); opacity: 1; }
        }

        .modal h1 {
            color: #d35400;
            font-size: 32px;
            margin-bottom: 15px;
            font-weight: 900;
        }

        .modal p {
            font-size: 18px;
            color: #444;
            margin-bottom: 10px;
            line-height: 1.5;
        }

        .modal .score-highlight {
            font-size: 40px;
            color: #27ae60;
            font-weight: 900;
            margin: 20px 0;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.2);
        }

        .btn {
            background: linear-gradient(to bottom, #ff8c00, #e65c00);
            color: white;
            border: none;
            padding: 15px 30px;
            font-size: 22px;
            font-family: 'Noto Sans Sinhala', sans-serif;
            font-weight: bold;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 5px 15px rgba(230, 92, 0, 0.4);
            transition: transform 0.2s, box-shadow 0.2s;
            margin-top: 20px;
            width: 100%;
        }

        .btn:hover {
            transform: translateY(-2px) scale(1.05);
            box-shadow: 0 8px 20px rgba(230, 92, 0, 0.6);
        }

        .btn:active {
            transform: translateY(2px);
        }

        .rules-box {
            background: rgba(255,255,255,0.6);
            border-radius: 10px;
            padding: 15px;
            margin-top: 20px;
            border: 1px dashed #e65c00;
        }

        /* Mobile specific adjustments */
        @media (max-width: 600px) {
            .modal h1 { font-size: 26px; }
            .hud-box { font-size: 18px; padding: 8px 15px; }
            .sun { width: 80px; height: 80px; top: 15%; }
            .item-container { width: 60px; height: 90px; }
        }

    </style>
</head>
<body>

    <div id="gameArea">
        <div class="bunting"></div>
        <div class="sun"></div>
        
        <div class="hud">
            <div class="hud-box" id="scoreDisplay">ලකුණු: 0</div>
            <div class="hud-box" id="timeDisplay">කාලය: 60s</div>
        </div>
    </div>

    <!-- Start Screen -->
    <div class="overlay" id="startScreen">
        <div class="modal">
            <h1>🌞 කණා මුට්ටි බිඳීම 🌞</h1>
            <p>අවුරුදු සිරිතට අනුව කණා මුට්ටි බිඳිමු!</p>
            
            <div class="rules-box">
                <p>🟢 <b>කිරි මුට්ටි</b> බිඳලා ලකුණු 10ක් ගන්න.</p>
                <p>🔴 <b>බඹර වද</b> වලට ගැහුවොත් ලකුණු 10ක් කැපෙනවා.</p>
                <p>තත්පර 60ක් ඇතුළත වැඩිම ලකුණු ගන්න!</p>
            </div>

            <button class="btn" onclick="startGame()">ගේම් එක පටන් ගන්න</button>
        </div>
    </div>

    <!-- Game Over Screen -->
    <div class="overlay" id="gameOverScreen" style="display: none;">
        <div class="modal">
            <h1>තරගය අවසන්!</h1>
            <p>ඔබ ගත් මුළු ලකුණු:</p>
            <div class="score-highlight" id="finalScoreDisplay">0</div>
            
            <button class="btn" onclick="startGame()">නැවතත් සෙල්ලම් කරන්න</button>
        </div>
    </div>

    <script>
        // Game Variables
        let score = 0;
        let timeLeft = 60;
        let gameInterval;
        let timerInterval;
        const gameArea = document.getElementById('gameArea');
        const scoreDisplay = document.getElementById('scoreDisplay');
        const timeDisplay = document.getElementById('timeDisplay');
        const startScreen = document.getElementById('startScreen');
        const gameOverScreen = document.getElementById('gameOverScreen');
        const finalScoreDisplay = document.getElementById('finalScoreDisplay');

        // SVG Assets (Inline for single-file and high quality)
        const svgMilkPot = `
            <svg viewBox="0 0 100 130">
                <!-- Rope -->
                <line x1="50" y1="0" x2="50" y2="40" stroke="#5c3a21" stroke-width="3"/>
                <!-- Milk spilling -->
                <path d="M 35 45 Q 20 60 40 80 Q 50 85 60 80 Q 80 60 65 45 Z" fill="#ffffff"/>
                <!-- Pot Body -->
                <ellipse cx="50" cy="80" rx="45" ry="40" fill="#a0522d"/>
                <!-- Pot Details/Shadow -->
                <ellipse cx="50" cy="80" rx="35" ry="30" fill="none" stroke="#8b4513" stroke-width="2" opacity="0.5"/>
                <!-- Pot Neck -->
                <path d="M 35 45 L 65 45 L 60 55 L 40 55 Z" fill="#8b4513"/>
                <!-- Pot Rim -->
                <ellipse cx="50" cy="45" rx="18" ry="6" fill="#6b3e11"/>
                <!-- Milk top -->
                <ellipse cx="50" cy="44" rx="15" ry="4" fill="#ffffff"/>
            </svg>
        `;

        const svgBeehive = `
            <svg viewBox="0 0 100 130">
                <!-- Rope -->
                <line x1="50" y1="0" x2="50" y2="30" stroke="#5c3a21" stroke-width="3"/>
                <!-- Branch -->
                <path d="M 20 30 Q 50 20 80 35" fill="none" stroke="#3e2723" stroke-width="6" stroke-linecap="round"/>
                <!-- Hive Body -->
                <ellipse cx="50" cy="75" rx="35" ry="45" fill="#fbc02d"/>
                <!-- Hive Lines -->
                <ellipse cx="50" cy="60" rx="32" ry="10" fill="none" stroke="#f57f17" stroke-width="3"/>
                <ellipse cx="50" cy="75" rx="34" ry="10" fill="none" stroke="#f57f17" stroke-width="3"/>
                <ellipse cx="50" cy="90" rx="28" ry="10" fill="none" stroke="#f57f17" stroke-width="3"/>
                <ellipse cx="50" cy="105" rx="18" ry="8" fill="none" stroke="#f57f17" stroke-width="3"/>
                <!-- Hive Hole -->
                <ellipse cx="50" cy="80" rx="8" ry="10" fill="#3e2723"/>
                <!-- Bees -->
                <circle cx="20" cy="60" r="3" fill="#212121"/>
                <circle cx="80" cy="70" r="2.5" fill="#212121"/>
                <circle cx="30" cy="100" r="3.5" fill="#212121"/>
                <circle cx="70" cy="50" r="2" fill="#212121"/>
                <circle cx="40" cy="40" r="3" fill="#212121"/>
            </svg>
        `;

        function updateHUD() {
            scoreDisplay.innerText = `ලකුණු: ${score}`;
            timeDisplay.innerText = `කාලය: ${timeLeft}s`;
            // Change time color when low
            if (timeLeft <= 10) {
                timeDisplay.style.color = '#e74c3c';
                timeDisplay.style.borderColor = '#e74c3c';
            } else {
                timeDisplay.style.color = '#333';
                timeDisplay.style.borderColor = '#ff8c00';
            }
        }

        function startGame() {
            // Reset variables
            score = 0;
            timeLeft = 60;
            updateHUD();
            
            // Hide Overlays
            startScreen.style.display = 'none';
            gameOverScreen.style.display = 'none';
            
            // Clear any existing items
            const existingItems = document.querySelectorAll('.item-container');
            existingItems.forEach(item => item.remove());

            // Start Timers
            timerInterval = setInterval(() => {
                timeLeft--;
                updateHUD();
                if (timeLeft <= 0) {
                    endGame();
                }
            }, 1000);

            // Spawn items every 800ms
            gameInterval = setInterval(spawnItem, 800);
            // Initially spawn a few
            spawnItem();
            setTimeout(spawnItem, 400);
        }

        function endGame() {
            clearInterval(timerInterval);
            clearInterval(gameInterval);
            
            // Clear remaining items
            const existingItems = document.querySelectorAll('.item-container');
            existingItems.forEach(item => item.remove());

            finalScoreDisplay.innerText = score;
            gameOverScreen.style.display = 'flex';
        }

        function spawnItem() {
            // Create container
            const item = document.createElement('div');
            item.className = 'item-container';
            
            // Randomly decide if it's a beehive (30% chance)
            const isBeehive = Math.random() < 0.3;
            
            item.innerHTML = isBeehive ? svgBeehive : svgMilkPot;
            
            // Randomize position (top half of screen)
            // Ensure it stays within screen bounds horizontally
            const maxX = window.innerWidth - 100; // 100 is item width + padding
            const randomX = Math.max(10, Math.floor(Math.random() * maxX));
            // Y position between 50px (below bunting) and 45% of screen height
            const maxY = window.innerHeight * 0.45;
            const randomY = Math.max(50, Math.floor(Math.random() * maxY));

            item.style.left = `${randomX}px`;
            item.style.top = `${randomY}px`;
            
            // Randomize swing speed and delay
            const duration = (Math.random() * 1 + 1.5).toFixed(2); // 1.5s to 2.5s
            item.style.animationDuration = `${duration}s`;
            item.style.animationDelay = `-${Math.random()}s`; // Start at random point in animation

            // Add Event Listeners (support both mouse and touch)
            const handleHit = (e) => {
                e.preventDefault(); // Prevent double firing on touch
                breakItem(item, isBeehive, randomX, randomY);
            };
            
            item.addEventListener('mousedown', handleHit);
            item.addEventListener('touchstart', handleHit, {passive: false});

            gameArea.appendChild(item);

            // Auto remove after some time if not clicked (3 to 5 seconds)
            const lifeTime = 3000 + Math.random() * 2000;
            setTimeout(() => {
                if (item.parentNode) {
                    item.style.opacity = '0';
                    item.style.transition = 'opacity 0.3s';
                    setTimeout(() => {
                        if (item.parentNode) item.remove();
                    }, 300);
                }
            }, lifeTime);
        }

        function breakItem(item, isBeehive, x, y) {
            // Remove the item
            item.remove();

            // Calculate center of item for effects
            const effectX = x + 40;
            const effectY = y + 60;

            // Update Score & Show Floating Text
            if (isBeehive) {
                score -= 10;
                showFloatingText('-10', effectX, effectY, '#e74c3c');
                createParticles(effectX, effectY, ['#fbc02d', '#212121', '#f57f17']); // Yellow/Black particles
                playHapticFeedback(true);
            } else {
                score += 10;
                showFloatingText('+10', effectX, effectY, '#27ae60');
                createParticles(effectX, effectY, ['#ffffff', '#a0522d', '#8b4513']); // White/Brown particles
                playHapticFeedback(false);
            }
            
            updateHUD();
        }

        function showFloatingText(text, x, y, color) {
            const el = document.createElement('div');
            el.className = 'floating-text';
            el.innerText = text;
            el.style.left = `${x - 20}px`;
            el.style.top = `${y - 20}px`;
            el.style.color = color;
            
            gameArea.appendChild(el);
            
            setTimeout(() => {
                if (el.parentNode) el.remove();
            }, 1000);
        }

        function createParticles(x, y, colors) {
            const particleCount = 15;
            for (let i = 0; i < particleCount; i++) {
                const particle = document.createElement('div');
                particle.className = 'particle';
                
                // Random color from provided array
                particle.style.backgroundColor = colors[Math.floor(Math.random() * colors.length)];
                
                // Randomize trajectory
                const angle = Math.random() * Math.PI * 2;
                const velocity = 50 + Math.random() * 100;
                const tx = Math.cos(angle) * velocity;
                const ty = Math.sin(angle) * velocity;
                
                particle.style.setProperty('--tx', `${tx}px`);
                particle.style.setProperty('--ty', `${ty}px`);
                
                particle.style.left = `${x}px`;
                particle.style.top = `${y}px`;
                
                gameArea.appendChild(particle);
                
                setTimeout(() => {
                    if (particle.parentNode) particle.remove();
                }, 600);
            }
        }

        // Optional: Vibration for mobile devices
        function playHapticFeedback(isBad) {
            if (navigator.vibrate) {
                if (isBad) {
                    navigator.vibrate([100, 50, 100]); // longer double vibration for bad hit
                } else {
                    navigator.vibrate(50); // short single vibration for good hit
                }
            }
        }

    </script>
</body>
</html>
